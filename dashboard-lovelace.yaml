              style: *scene_card

          - type: custom:mushroom-template-card
            primary: "Détente"
            secondary: "Lumières douces"
            icon: mdi:sofa
            icon_color: amber
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.detente         # → votre scène
            card_mod:
              style: *scene_card

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "Nuit"
            secondary: "Tout éteint"
            icon: mdi:weather-night
            icon_color: indigo
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.nuit            # → votre scène
            card_mod:
              style: *scene_card

          - type: custom:mushroom-template-card
            primary: "Réveil"
            secondary: "Lumières douces + musique"
            icon: mdi:weather-sunny
            icon_color: orange
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.reveil          # → votre scène
            card_mod:
              style: *scene_card

          - type: custom:mushroom-template-card
            primary: "Absence"
            secondary: "Sécurité activée"
            icon: mdi:home-export-outline
            icon_color: red
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.absence         # → votre scène
            card_mod:
              style: *scene_card

          - type: custom:mushroom-template-card
            primary: "Retour"
            secondary: "Maison prête"
            icon: mdi:home-import-outline
            icon_color: green
            tap_action:
              action: call-service
              service: scene.turn_on
              service_data:
                entity_id: scene.retour          # → votre scène
            card_mod:
              style: *scene_card

      # ── Automatisations rapides ──────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: "Activer / Désactiver"
        card_mod:
          style: *room_title

      - type: custom:mushroom-entity-card
        entity: automation.lumieres_coucher      # → automatisation lumières coucher
        name: "Lumières au coucher du soleil"
        icon: mdi:weather-sunset-down
        icon_color: orange
        tap_action:
          action: toggle
        card_mod:
          style: *glass_card

      - type: custom:mushroom-entity-card
        entity: automation.chauffage_nuit        # → automatisation chauffage nuit
        name: "Chauffage mode nuit"
        icon: mdi:radiator
        icon_color: cyan
